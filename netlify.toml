# Netlify configuration for Next.js.
# The official Next.js runtime (@netlify/plugin-nextjs) is auto-installed by
# Netlify and manages the output directory + server-side routes, so we do NOT
# set `publish` manually (setting it to ".next" conflicts with the runtime).
[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"
